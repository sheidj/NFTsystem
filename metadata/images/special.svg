<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="specialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#fde047;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#facc15;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:0.8" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 主背景 -->
  <rect width="500" height="500" fill="url(#specialGrad)"/>
  
  <!-- 装饰闪光 -->
  <g opacity="0.4">
    <circle cx="100" cy="100" r="4" fill="#fef3c7"/>
    <circle cx="400" cy="120" r="5" fill="#fef3c7"/>
    <circle cx="450" cy="380" r="4" fill="#fef3c7"/>
    <circle cx="80" cy="400" r="6" fill="#fef3c7"/>
    <circle cx="350" cy="450" r="4" fill="#fef3c7"/>
    <circle cx="120" cy="200" r="3" fill="#fde047"/>
    <circle cx="380" cy="300" r="5" fill="#fde047"/>
  </g>
  
  <!-- 光芒圆环 -->
  <circle cx="250" cy="200" r="130" fill="none" stroke="#fde047" stroke-width="2" opacity="0.3"/>
  <circle cx="250" cy="200" r="145" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
  
  <!-- 主星光效果 -->
  <g filter="url(#glow)">
    <!-- 8方向光芒 -->
    <line x1="250" y1="200" x2="250" y2="70" stroke="#fde047" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="250" y1="200" x2="250" y2="330" stroke="#fde047" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="250" y1="200" x2="120" y2="200" stroke="#fde047" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="250" y1="200" x2="380" y2="200" stroke="#fde047" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="250" y1="200" x2="160" y2="110" stroke="#fde047" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="250" y1="200" x2="340" y2="110" stroke="#fde047" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="250" y1="200" x2="160" y2="290" stroke="#fde047" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="250" y1="200" x2="340" y2="290" stroke="#fde047" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- 中心五角星 -->
  <g filter="url(#glow)">
    <polygon points="250,120 270,170 325,178 287,214 297,268 250,243 203,268 213,214 175,178 230,170" 
             fill="url(#starGlow)" stroke="#f59e0b" stroke-width="3"/>
  </g>
  
  <!-- 围绕的小星星 -->
  <text x="320" y="160" font-family="Arial, sans-serif" font-size="30" text-anchor="middle" fill="#fef3c7">⭐</text>
  <text x="180" y="160" font-family="Arial, sans-serif" font-size="30" text-anchor="middle" fill="#fef3c7">⭐</text>
  <text x="320" y="260" font-family="Arial, sans-serif" font-size="30" text-anchor="middle" fill="#fef3c7">⭐</text>
  <text x="180" y="260" font-family="Arial, sans-serif" font-size="30" text-anchor="middle" fill="#fef3c7">⭐</text>
  
  <!-- 主图标 -->
  <text x="250" y="220" font-family="Arial, sans-serif" font-size="75" text-anchor="middle" fill="#fff" filter="url(#glow)">⭐</text>
  
  <!-- 装饰带 -->
  <path d="M 150 360 Q 250 340 350 360" fill="none" stroke="#fde047" stroke-width="3" opacity="0.8"/>
  <path d="M 150 375 Q 250 355 350 375" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
  
  <!-- 文字 -->
  <text x="250" y="420" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#fff">特殊奖项</text>
  <text x="250" y="455" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#fef3c7">Special Award</text>
</svg>

