<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="diplomaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef3c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 主背景 -->
  <rect width="500" height="500" fill="url(#diplomaGrad)"/>
  
  <!-- 装饰圆圈 -->
  <circle cx="50" cy="50" r="30" fill="#60a5fa" opacity="0.3"/>
  <circle cx="450" cy="450" r="40" fill="#60a5fa" opacity="0.3"/>
  <circle cx="420" cy="80" r="25" fill="#93c5fd" opacity="0.4"/>
  
  <!-- 证书纸张 -->
  <rect x="80" y="100" width="340" height="300" rx="10" fill="url(#paperGrad)" stroke="#fbbf24" stroke-width="4"/>
  
  <!-- 顶部装饰线 -->
  <line x1="100" y1="130" x2="400" y2="130" stroke="#3b82f6" stroke-width="2"/>
  <line x1="100" y1="135" x2="400" y2="135" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  
  <!-- 毕业证书图标 -->
  <text x="250" y="200" font-family="Arial, sans-serif" font-size="80" text-anchor="middle" fill="#3b82f6">📜</text>
  
  <!-- 文字 -->
  <text x="250" y="260" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#1e40af">毕业证书</text>
  <text x="250" y="295" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#64748b">Official Diploma</text>
  
  <!-- 底部装饰 -->
  <circle cx="250" cy="340" r="8" fill="#fbbf24"/>
  <rect x="230" y="355" width="40" height="3" rx="2" fill="#fbbf24"/>
  
  <!-- 底部年份 -->
  <text x="250" y="380" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#64748b">2024</text>
</svg>

