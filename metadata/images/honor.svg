<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="honorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="trophyGlow" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#f59e0b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.6" />
    </radialGradient>
  </defs>
  
  <!-- 主背景 -->
  <rect width="500" height="500" fill="url(#honorGrad)"/>
  
  <!-- 装饰星光 -->
  <circle cx="80" cy="80" r="3" fill="#fbbf24"/>
  <circle cx="420" cy="100" r="4" fill="#fbbf24"/>
  <circle cx="450" cy="400" r="3" fill="#fbbf24"/>
  <circle cx="100" cy="420" r="5" fill="#fbbf24"/>
  <circle cx="380" cy="180" r="3" fill="#fde047"/>
  <circle cx="120" cy="250" r="4" fill="#fde047"/>
  
  <!-- 光芒效果 -->
  <g opacity="0.3">
    <line x1="250" y1="100" x2="250" y2="50" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="250" y1="100" x2="220" y2="60" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="250" y1="100" x2="280" y2="60" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="250" y1="100" x2="200" y2="75" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="250" y1="100" x2="300" y2="75" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- 奖杯底座 -->
  <rect x="200" y="320" width="100" height="50" rx="5" fill="url(#trophyGlow)"/>
  <rect x="180" y="360" width="140" height="20" rx="5" fill="#d97706"/>
  
  <!-- 奖杯主体 -->
  <path d="M 220 320 L 215 250 Q 215 230 235 230 L 265 230 Q 285 230 285 250 L 280 320 Z" 
        fill="url(#trophyGlow)" stroke="#f59e0b" stroke-width="2"/>
  
  <!-- 奖杯手柄 -->
  <path d="M 215 270 Q 180 270 180 240 Q 180 220 200 220" 
        fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <path d="M 285 270 Q 320 270 320 240 Q 320 220 300 220" 
        fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  
  <!-- 奖杯顶部装饰 -->
  <ellipse cx="250" cy="230" rx="30" ry="15" fill="#fbbf24"/>
  
  <!-- 奖杯图标 -->
  <text x="250" y="180" font-family="Arial, sans-serif" font-size="90" text-anchor="middle" fill="#fbbf24">🏆</text>
  
  <!-- 文字 -->
  <text x="250" y="420" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#fff">荣誉证书</text>
  <text x="250" y="455" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#e9d5ff">Honor Certificate</text>
</svg>

